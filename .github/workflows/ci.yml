name: CI Quality Gate

on:
  push:
    branches: [ main, devops-quality-upgrade ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-multipart pillow numpy pytest httpx ruff

      - name: Run lint
        run: |
          ruff check app.py tests || true

      - name: Run tests
        run: |
          pytest -q